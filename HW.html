<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: white;
        }
        #coffeeMachine {
            background: beige;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 200px;
        }
        #waterContainer {
            background: wheat;
            width: 50px;
            height: 150px;
            margin: 0 auto 10px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        #waterBox {
            background: skyblue;
            width: 100%;
            height: 0%;
            color: black;
            text-align: center;
            position: absolute;
            bottom: 0;
            line-height: 150px;
            font-weight: bold;
        }
        .toggle-buttons {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            opacity: 0.8;
        }
        #enableBtn {
            background: green;
            color: white;
        }
        #disableBtn {
            background: red;
            color: white;
        }
        #fillWater, #startCoffee, #stopCoffee {
            margin: 5px 0;
            width: 100%;
            background: grey;
            color: white;
        }
        #messageBox {
            margin-top: 10px;
            min-height: 20px;
            font-weight: bold;
            color: grey;
        }
    </style>
</head>
<body>
    <div id="coffeeMachine">
        <h2>Кавоварка</h2>
        <div id="waterContainer">
            <div id="waterBox">0%</div>
        </div>
        <div class="toggle-buttons">
            <button id="enableBtn">Вкл</button>
            <button id="disableBtn">Викл</button>
        </div>
        <button id="fillWater">Залити воду</button>
        <button id="startCoffee">Запустити</button>
        <button id="stopCoffee">Зупинити</button>
        <div id="messageBox"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
