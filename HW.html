<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            font-family:Arial;
        }
        .btn{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            text-decoration:none;
            color:white;
            transition:0.3s;
        }
        .btn:hover{
            transform:scale(0.98);
            filter:brightness(120%);
        }
        .block{
            background:#ff4da6;
        }
        .text{
            background:#6a5acd;
        }
        .image{
            background:#00b894;
        }
    </style>
</head>
<body>
    <a href="div.html" class="btn block">BLOCK</a>
    <a href="text.html" class="btn text">TEXT</a>
    <a href="image.html" class="btn image">IMAGE</a>
</body>
</html>
