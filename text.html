<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: peachpuff;
            color: black;
        }
        #cont{
            display:flex;
            height:100vh;
        }
        #settings{
            width:300px;
            padding:15px;
            overflow-y:auto;
            color: black;
            background:peachpuff;
        }
        .workspace{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            background: lightblue;
        }
        #template{
            font-size:40px;
            color:black;
        }
        form{
            display:flex;
            flex-direction:column;
            gap:10px;
        }
        form input,
        form select{
            display:block;
            width:100%;
        }
    </style>
</head>
<body>
<div id="cont">
    <div id="settings">
        <h1>Text Settings</h1>
        <form id="setStyle">
            Text
            <input type="text" name="text" value="Template">
            Font Size
            <input type="range" name="fontSize" min="10" max="100" value="40">
            Text Color
            <input type="color" name="color">
            Font Family
            <select name="fontFamily">
                <option value="Arial">Arial</option>
                <option value="Verdana">Verdana</option>
                <option value="Courier New">Courier</option>
                <option value="Georgia">Georgia</option>
            </select>
            Font Weight
            <select name="fontWeight">
                <option value="normal">normal</option>
                <option value="bold">bold</option>
            </select>
            Font Style
            <select name="fontStyle">
                <option value="normal">normal</option>
                <option value="italic">italic</option>
            </select>
            Text Transform
            <select name="transform">
                <option value="none">none</option>
                <option value="uppercase">uppercase</option>
                <option value="lowercase">lowercase</option>
                <option value="capitalize">capitalize</option>
            </select>
            Letter Spacing
            <input type="range" name="spacing" min="0" max="20">
            Text Align
            <select name="align">
                <option value="left">left</option>
                <option value="center">center</option>
                <option value="right">right</option>
            </select>
            Shadow
            <input type="checkbox" name="shadowCheck">
            Shadow X
            <input type="range" name="shadowX" min="-50" max="50">
            Shadow Y
            <input type="range" name="shadowY" min="-50" max="50">
            Blur
            <input type="range" name="blur" min="0" max="50">
            Shadow Color
            <input type="color" name="shadowColor">
        </form>
        <pre id="cssOutput"></pre>
    </div>
    <div class="workspace">
        <div id="template">Template</div>
    </div>
</div>
<script src="text.js"></script>
</body>
</html>
