<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            padding: 20px;
            background-color: papayawhip;
            color: black;
            font-family: Arial;
        }
        h1{
            text-align: center;
            margin-bottom: 30px;
        }
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        #players{
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .card{
            width: 250px;
            background-color: darkgray;
            border: 2px solid gray;
            border-radius: 10px;
            overflow: hidden;
            cursor: grab;
            transition: 0.3s;
        }
        .card:hover{
            transform: scale(1.03);
            border-color: gold;
        }
        .card img{
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .info{
            padding: 15px;
        }
        .info h2{
            margin-top: 0;
        }
        .skills{
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .stats p{
            margin: 5px 0;
        }
        #team{
            width: 90%;
            min-height: 300px;
            border: 3px dashed gold;
            border-radius: 15px;
            padding: 20px;
            background-color: #2b2b2b;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-content: flex-start;
        }
        #team h2{
            width: 100%;
            text-align: center;
            margin-top: 0;
        }
        #team.hovered{
            border-color: gold;
            background-color: #3a3a3a;
        }
        .teamCard{
            width: 220px;
            background-color: #444;
            padding: 10px;
            border-radius: 10px;
        }
        .teamCard img{
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        #message{
            text-align: center;
            color: tomato;
            font-size: 20px;
            margin-bottom: 20px;
            height: 30px;
        }
        .buttons{
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button{
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Fantasy Team Builder</h1>
    <div id="message"></div>
    <div class="container">
        <div id="players"></div>
        <div id="team">
            <h2>Team</h2>
        </div>
    </div>
    <div class="buttons">
        <button id="clearBtn">Clear Team</button>
        <button id="saveBtn">Save Team</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
