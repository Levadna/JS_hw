<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 800px;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial;
        }
        #menu button {
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>Арканоїд</h1>
        <p style="color: white;">Сірий блок НЕ знищується</p>
        <p style="color: cyan;">Синє зілля: платформа +10 сек</p>
        <p style="color: purple;">Фіолетове зілля: +1 життя</p>
        <button id="startBtn">START</button>
    </div>
    <canvas id="myCanvas" width="800" height="800"></canvas>
    <script src="script4.js" defer></script>
</body>
</html>
